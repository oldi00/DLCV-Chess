[project]
name = "src"
version = "0.1.0"
description = "Chess CNN Project"
authors = [
    {name = "oldi", email = "oldenburgermarkus@gmail.com"}
]
package-mode = false
readme = "README.md"
requires-python = ">=3.11,<3.15"

dependencies = []

[tool.poetry.dependencies]
python = ">=3.11,<3.15"
numpy = ">=2.0.0,<2.3.0"
matplotlib = ">=3.10.8,<4.0.0"
scikit-learn = ">=1.8.0,<2.0.0"
optuna = ">=4.6.0,<5.0.0"
pydrive2 = ">=1.21.3,<2.0.0"
opencv-python = ">=4.12.0.88,<5.0.0.0"

torch = { url = "https://download.pytorch.org/whl/cu126/torch-2.9.1%2Bcu126-cp312-cp312-win_amd64.whl" }
torchvision = { url = "https://download.pytorch.org/whl/cu126/torchvision-0.24.1%2Bcu126-cp312-cp312-win_amd64.whl" }

[build-system]
requires = ["poetry-core>=2.0.0,<3.0.0"]
build-backend = "poetry.core.masonry.api"

[[tool.poetry.source]]
name = "pytorch-gpu"
url = "https://download.pytorch.org/whl/cu126"
priority = "explicit"